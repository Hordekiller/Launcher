name: Windows Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore LauncherShyax.csproj

      - name: Build solution
        run: dotnet build LauncherShyax.csproj --configuration Release --no-restore

      - name: Publish build artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-release
          path: |
            bin/Release/**
            LauncherShyax.csproj
