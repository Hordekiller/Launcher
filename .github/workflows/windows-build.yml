name: Windows Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore LauncherShyax.csproj

      - name: Build solution
        shell: pwsh
        run: |
          dotnet build LauncherShyax.csproj --configuration Release --no-restore 2>&1 | Tee-Object -FilePath build.log

      - name: Publish application
        if: success()
        shell: pwsh
        run: |
          dotnet publish LauncherShyax.csproj --configuration Release --output publish --no-restore 2>&1 | Tee-Object -FilePath publish.log

      - name: Publish build artifacts (logs and output)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launcher-artifacts
          path: |
            build.log
            publish/**
            publish.log
